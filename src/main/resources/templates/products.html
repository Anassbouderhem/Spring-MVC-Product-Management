<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <link rel="stylesheet" type="text/css" href="/webjars/bootstrap/5.3.3/css/bootstrap.min.css">
</head>
<body>
    <h2 class="text-center my-4 fw-bold">La liste des produits</h2>
    <div class="p-3">
        <table class="table">
            <thead>
            <th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Quantity</th>
            </thead>
            <tbody>
                <tr th:each="p:${productList}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.name}"></td>
                    <td th:text="${p.category}"></td>
                    <td th:text="${p.price}"></td>
                    <td th:text="${p.quantity}"></td>
                    <td>
                        <a class="btn btn-danger" onclick="return confirm('Etes vous sûre de vouloir supprimer ?')" th:href="@{/delete(id=${p.id})}">Delete</a>
                    </td>

                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
