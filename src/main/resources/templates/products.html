<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
layout:decorate="layout1">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
</head>
<body>
    <div class="p-3" layout:fragment="content1">
        <h2 class="text-center my-4 fw-bold">La liste des produits</h2>
        <div class="d-flex justify-content-between align-items-center mb-4" sec:authorize="hasRole('ADMIN')">
            <a class="btn btn-primary" th:href="@{/admin/newProduct}">New Product</a>
            <form th:action="@{/user/search}" method="get" class="mb-3">
                <input type="text" name="keyword" th:value="${keyword}" placeholder="Search product..." class="form-control" />
                <button type="submit" class="btn btn-primary mt-2">Search</button> </form>
        </div>
        <table class="table">
            <thead>
            <th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Quantity</th>
            </thead>
            <tbody>
                <tr th:each="p:${productList}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.name}"></td>
                    <td th:text="${p.category}"></td>
                    <td th:text="${p.price}"></td>
                    <td th:text="${p.quantity}"></td>

                    <td sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/admin/editProduct(id=${p.id})}" class="btn btn-primary">Edit</a>
                    </td>

                    <td sec:authorize="hasRole('ADMIN')">
                        <form method="post" th:action="@{/admin/delete(id=${p.id})}">
                           <button type="submit" class="btn btn-danger" onclick="return confirm('Etes vous sûre de vouloir supprimer ?')">Delete</button>
                        </form>
                    </td>

                </tr>
            </tbody>
        </table>
        <div class="text-center">
            <ul class="nav nav-pills d-inline-flex">
                <li th:each="page,status : ${pages}" class="mx-1">
                    <a th:class="${status.index==currentPage ? 'btn btn-primary' : 'btn btn-outline-primary'}"
                       th:href="@{/user/index(page=${status.index},keyword=${keyword})}"
                       th:text="${status.index+1}">
                    </a>
                </li>
            </ul>
        </div>
    </div>
</body>
</html>
