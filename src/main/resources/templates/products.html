<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
layout:decorate="layout1">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
</head>
<body>
    <div class="p-4 bg-light rounded shadow-sm" layout:fragment="content1">
        <h2 class="text-center my-4 fw-bold text-primary">La liste des produits</h2>

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 gap-3">

            <a class="btn btn-success btn-lg shadow-sm"
               th:href="@{/admin/newProduct}"
               sec:authorize="hasRole('ADMIN')">
                <i class="bi bi-plus-circle me-2"></i>New Product
            </a>

            <form th:action="@{/user/search}" method="get" class="d-flex flex-column flex-md-row gap-2 w-100 w-md-auto">
                <input type="text"
                       name="keyword"
                       th:value="${keyword}"
                       placeholder="Search product..."
                       class="form-control form-control-lg shadow-sm" />

                <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                    <i class="bi bi-search me-1"></i>Search
                </button>
            </form>
        </div>
    <table class="table table-striped table-hover table-bordered align-middle shadow-sm">
        <thead class="table-dark text-center">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Quantity</th>
            <th sec:authorize="hasRole('ADMIN')">Edit</th>
            <th sec:authorize="hasRole('ADMIN')">Delete</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="p : ${productList}" class="text-center align-middle">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.category}"></td>
            <td th:text="${p.price}"></td>
            <td th:text="${p.quantity}"></td>

            <td sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/admin/editProduct(id=${p.id})}"
                   class="btn btn-sm btn-primary shadow-sm">
                    <i class="bi bi-pencil-square me-1"></i>Edit
                </a>
            </td>

            <td sec:authorize="hasRole('ADMIN')">
                <form method="post" th:action="@{/admin/delete(id=${p.id})}" class="d-inline">
                    <button type="submit"
                            class="btn btn-sm btn-danger shadow-sm"
                            onclick="return confirm('Etes-vous sûre de vouloir supprimer ?')">
                        <i class="bi bi-trash3-fill me-1"></i>Delete
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

        <div class="text-center">
            <ul class="nav nav-pills d-inline-flex">
                <li th:each="page,status : ${pages}" class="mx-1">
                    <a th:class="${status.index==currentPage ? 'btn btn-primary' : 'btn btn-outline-primary'}"
                       th:href="@{/user/index(page=${status.index},keyword=${keyword})}"
                       th:text="${status.index+1}">
                    </a>
                </li>
            </ul>
        </div>
    </div>
</body>
</html>
